<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScholarTrace · Ranking</title>
<style>
  :root{
    --blue:#d97757;
    --blue-hover:#c2410c;
    --ink:#2b2118;
    --gray:#6b5d52;
    --gray-soft:#9a8b7e;
    --border:#ece2d8;
    --bg:#faf6f2;
    --link:#b8551e;
    --c-self:#e8804a;
    --c-advisor:#f0a060;
    --c-collab:#f5bd87;
    --c-paper:#f8d9b8;
    --shadow-sm:0 1px 2px rgba(120,72,40,.07),0 1px 3px rgba(120,72,40,.10);
    --shadow-md:0 4px 12px rgba(120,72,40,.09),0 2px 4px rgba(120,72,40,.06);
    --shadow-lg:0 12px 32px rgba(120,72,40,.14),0 4px 8px rgba(120,72,40,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{min-height:100%;}
  body{font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(680px 480px at 18% -8%,rgba(217,119,87,.16),transparent 60%),radial-gradient(560px 420px at 92% 6%,rgba(240,168,104,.12),transparent 60%),var(--bg);}
  ::selection{background:rgba(217,119,87,.25);color:var(--ink);}
  a{color:inherit;text-decoration:none;}

  header{position:sticky;top:0;background:rgba(250,246,242,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;z-index:40;}
  header .brand{display:flex;align-items:center;gap:11px;}
  header .brand .cap{flex:0 0 auto;}
  header .brand .word{display:flex;align-items:baseline;gap:8px;}
  header .brand b{font-weight:700;font-size:16px;letter-spacing:-.3px;color:var(--ink);}
  header .brand .zh{font-size:14px;color:var(--gray);}
  header .brand .back{font-size:11px;color:var(--gray-soft);margin-top:1px;display:block;}
  header .status{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--gray);font-family:'JetBrains Mono',monospace;}
  header .status .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 1.6s ease-in-out infinite;}
  header .status .dot.done{background:#0e9f6e;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  header .progress{width:140px;height:4px;border-radius:2px;background:rgba(120,72,40,.12);overflow:hidden;position:relative;}
  header .progress .bar{height:100%;background:linear-gradient(90deg,#d97757,#c2410c);transition:width .5s;position:relative;}
  header .progress .bar::after{content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shimmer 1.6s infinite;}
  @keyframes shimmer{100%{left:200%;}}

  main{max-width:1200px;margin:0 auto;padding:32px 24px 60px;}
  .title-area{margin-bottom:28px;}
  .title-area .path{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue-hover);letter-spacing:1px;margin-bottom:6px;}
  .title-area h1{font-size:30px;font-weight:700;letter-spacing:-.8px;color:var(--ink);line-height:1.2;}
  .title-area p{font-size:14px;color:var(--gray);margin-top:4px;line-height:1.6;}

  .layout{display:grid;grid-template-columns:280px 1fr;gap:24px;}
  @media(max-width:760px){.layout{grid-template-columns:1fr;}}

  /* === 左 sidebar: 权重滑块 === */
  aside{position:sticky;top:84px;align-self:start;}
  .panel{background:rgba(255,253,251,.78);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow-sm);}
  .panel-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gray-soft);margin-bottom:16px;}
  .weight-row{margin-bottom:18px;}
  .weight-row .label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;font-size:13px;}
  .weight-row .label .k{color:var(--ink);font-weight:550;}
  .weight-row .label .v{color:var(--blue-hover);font-family:'JetBrains Mono',monospace;font-weight:600;}
  .weight-row .sub{font-size:10.5px;color:var(--gray-soft);margin-top:6px;font-family:'JetBrains Mono',monospace;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:rgba(120,72,40,.13);border-radius:3px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#d97757,#c2410c);cursor:pointer;box-shadow:0 2px 6px rgba(194,65,12,.4);}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#d97757,#c2410c);cursor:pointer;border:0;box-shadow:0 2px 6px rgba(194,65,12,.4);}
  .formula{border-top:1px solid var(--border);padding-top:14px;margin-top:8px;}
  .formula .lbl{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gray-soft);}
  .formula .eq{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gray);margin-top:4px;line-height:1.65;}
  .k-select{margin-top:16px;}
  .k-select .lbl{font-size:11.5px;color:var(--gray);margin-bottom:8px;}
  .k-btn{padding:5px 12px;border:1px solid var(--border);background:rgba(255,253,251,.6);color:var(--gray);font-size:12px;border-radius:8px;cursor:pointer;margin-right:6px;transition:all .15s;font-family:inherit;}
  .k-btn.active{background:linear-gradient(135deg,#d97757,#c2410c);color:#fff;border-color:transparent;font-weight:600;}
  .k-btn:not(.active):hover{border-color:rgba(217,119,87,.5);color:var(--ink);}
  .reset{width:100%;margin-top:14px;padding:9px 0;background:rgba(120,72,40,.06);border:1px solid var(--border);color:var(--gray);font-size:12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .reset:hover{background:rgba(120,72,40,.10);color:var(--ink);}

  /* === 右: 学者列表 === */
  .ranked-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .ranked-head h3{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gray-soft);}
  .ranked-head .meta{font-size:11px;color:var(--gray-soft);font-family:'JetBrains Mono',monospace;}
  .rank-list{display:flex;flex-direction:column;gap:10px;}
  .rank-card{background:rgba(255,253,251,.85);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;gap:16px;align-items:flex-start;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;text-decoration:none;color:inherit;}
  .rank-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(217,119,87,.45);}
  .rank-card.ai-judged{border-color:rgba(217,119,87,.4);box-shadow:0 0 0 1px rgba(217,119,87,.2),0 6px 18px rgba(217,119,87,.10);}
  .rank-card .rank-no{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .rank-card .rank-no .num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gray-soft);font-weight:600;}
  .rank-card .avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;}
  .rank-card .body{flex:1;min-width:0;}
  .rank-card .name-row{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;flex-wrap:wrap;}
  .rank-card h4{font-size:16px;font-weight:650;color:var(--ink);letter-spacing:-.2px;}
  .rank-card .en{font-size:12.5px;color:var(--gray);}
  .rank-card .badge{font-size:10px;padding:2px 7px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-weight:600;}
  .rank-card .badge.unverified{background:rgba(176,130,0,.13);color:#b08200;border:1px solid rgba(176,130,0,.30);}
  .rank-card .badge.ai{background:rgba(217,119,87,.13);color:var(--blue-hover);border:1px solid rgba(217,119,87,.30);display:inline-flex;align-items:center;gap:4px;animation:pop .5s cubic-bezier(.16,1,.3,1),glow .25s ease-in-out infinite alternate;}
  @keyframes pop{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
  @keyframes glow{from{box-shadow:0 0 0 0 rgba(217,119,87,0);}to{box-shadow:0 0 8px 1px rgba(217,119,87,.25);}}
  .rank-card .inst{font-size:11.5px;color:var(--gray);margin-bottom:4px;}
  .rank-card .role{font-size:12.5px;color:var(--ink);line-height:1.5;margin-bottom:10px;}
  .rank-card .rag-hit{font-size:11.5px;color:var(--gray);line-height:1.55;margin:-2px 0 10px;padding-left:10px;border-left:2px solid rgba(217,119,87,.35);}
  .rank-card .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .rank-card .m{display:flex;flex-direction:column;gap:3px;}
  .rank-card .m .row{display:flex;justify-content:space-between;font-size:11px;}
  .rank-card .m .row .k{color:var(--gray-soft);}
  .rank-card .m .row .v{color:var(--blue-hover);font-family:'JetBrains Mono',monospace;font-weight:600;}
  .rank-card .m .bar{height:3px;border-radius:2px;background:rgba(120,72,40,.10);overflow:hidden;}
  .rank-card .m .bar > div{height:100%;background:linear-gradient(90deg,#d97757,#c2410c);transition:width .5s;}
  .rank-card .field-cnt{flex:0 0 auto;text-align:right;}
  .rank-card .field-cnt .lbl{font-size:10px;color:var(--gray-soft);text-transform:uppercase;letter-spacing:.5px;}
  .rank-card .field-cnt .v{font-size:22px;font-weight:700;color:var(--ink);}
  .rank-card .field-cnt .score{font-size:10px;color:var(--gray-soft);font-family:'JetBrains Mono',monospace;margin-top:4px;}

  @keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .card-enter{opacity:0;animation:slideIn .5s cubic-bezier(.16,1,.3,1) forwards;}

  footer{font-size:12px;color:var(--gray-soft);padding:20px 28px 30px;text-align:center;}
</style>
</head>
<body>

<header>
  <a class="brand" href="index.html">
    <svg class="cap" width="32" height="32" viewBox="0 0 50 50"><defs><linearGradient id="capG2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8804a"/><stop offset="1" stop-color="#c2410c"/></linearGradient></defs><circle cx="25" cy="25" r="25" fill="url(#capG2)"/><path d="M25 13 L41 20.5 L25 28 L9 20.5 Z" fill="#fff"/><path d="M15 23.5 L15 31 C15 33.7 19.5 35.4 25 35.4 C30.5 35.4 35 33.7 35 31 L35 23.5 L25 28 Z" fill="#fff" opacity=".9"/></svg>
    <div class="word"><b>ScholarTrace</b><span class="zh">学脉</span></div>
  </a>
  <div class="status">
    <span id="status-dot" class="dot"></span>
    <span id="status-text">骨架渲染中</span>
    <div class="progress"><div class="bar" id="progress" style="width:30%"></div></div>

</header>

<main>
  <div class="title-area">
    <p class="path" id="concept-path"></p>
    <h1 id="field-name"></h1>
    <p id="field-desc"></p>
  </div>

  <div class="layout">
    <aside>
      <div class="panel">
        <p class="panel-title">影响力权重</p>
        <div class="weight-row">
          <div class="label"><span class="k">学术沉淀</span><span class="v" id="w1-val">40%</span></div>
          <input id="w1" type="range" min="0" max="100" value="40">
          <p class="sub">h-index</p>
        </div>
        <div class="weight-row">
          <div class="label"><span class="k">学术影响力</span><span class="v" id="w2-val">30%</span></div>
          <input id="w2" type="range" min="0" max="100" value="30">
          <p class="sub">log(total citations)</p>
        </div>
        <div class="weight-row">
          <div class="label"><span class="k">近期活跃度</span><span class="v" id="w3-val">30%</span></div>
          <input id="w3" type="range" min="0" max="100" value="30">
          <p class="sub">recent 3y citations</p>
        </div>
        <div class="formula">
          <p class="lbl">// 公式</p>
          <p class="eq">Score = w₁·H<br>　　 + w₂·log(Cit)<br>　　 + w₃·RecentCit</p>
        </div>
        <div class="k-select">
          <p class="lbl">显示 Top K</p>
          <button class="k-btn active" data-k="10">10</button>
          <button class="k-btn" data-k="20">20</button>
          <button class="k-btn" data-k="50">50</button>
        </div>
        <button class="reset" id="reset">重置为默认权重</button>
      </div>
    </aside>

    <section>
      <div class="ranked-head">
        <h3>Ranked Scholars</h3>
        <span class="meta" id="meta-info"></span>
      </div>
      <div class="rank-list" id="list"></div>
    </section>
  </div>
</main>

<footer>数据来源：Semantic Scholar API · 真实版本由 OpenAlex + LLM 实时支持</footer>

<script>
const params = new URLSearchParams(location.search);
const fieldId = params.get("id") || "learning-to-rank";
const searchQuery = (params.get("q") || "").trim();
let K = 10;
let DATA = null;
let ragByScholar = new Map();
let ragReady = false;
let ragError = null;
let aiJudged = new Set();
let aiScores = {};
let firstRender = true;

function countUp(el, target, duration=700, fmt = v => Math.round(v).toLocaleString()){
  if(!el) return;
  const start = performance.now();
  function tick(now){
    const t = Math.min((now-start)/duration, 1);
    const eased = 1 - Math.pow(1-t, 3);
    el.textContent = fmt(target * eased);
    if(t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

const AVATAR_COLORS = {
  amber:"#e8804a", rose:"#d96a5f", purple:"#a76aaf", blue:"#5b8cbf", indigo:"#7470c2",
  emerald:"#5fa68a", fuchsia:"#c065a3", sky:"#6aaacc", stone:"#a08b78", violet:"#8a72b3", slate:"#7d7468"
};

fetch(`data/${fieldId}.json`).then(r => r.json()).then(d => {
  DATA = d;
  document.getElementById("concept-path").textContent = searchQuery ? "OPENALEX LIVE · 实时检索" : "RAG SCHOLAR SEARCH";
  document.getElementById("field-name").textContent = searchQuery ? `${searchQuery} · 实时搜索` : "关键词检索结果";
  document.getElementById("field-desc").textContent = searchQuery ? `🛰 正在通过 OpenAlex 实时检索「${searchQuery}」...` : "输入关键词后按语义相关性排序学者";
  document.getElementById("meta-info").textContent = searchQuery ? "OpenAlex 实时聚合中..." : `本地指标排序 → Top ${K}`;
  document.getElementById("status-text").textContent = searchQuery ? "OpenAlex 实时检索…" : "骨架渲染中";

  loadRagResults().finally(() => setTimeout(() => {
    renderList();
    document.getElementById("progress").style.width = "55%";
    if(searchQuery){
      document.getElementById("field-desc").textContent = ragReady
        ? `🛰 OpenAlex 实时聚合 · 「${searchQuery}」匹配的 top 学者`
        : `⚠ OpenAlex 检索失败 · 显示本地缓存（${ragError?.message || '未知错误'}）`;
      document.getElementById("status-text").textContent = ragReady ? "实时检索完成 · AI 重排" : "OpenAlex 失败 · 显示缓存";
    } else {
      document.getElementById("status-text").textContent = "骨架已渲染 · AI 重排开始";
    }
    startAIStream();
  }, 300));
});

function getWeights(){
  const w1 = parseInt(document.getElementById("w1").value);
  const w2 = parseInt(document.getElementById("w2").value);
  const w3 = parseInt(document.getElementById("w3").value);
  const sum = w1+w2+w3 || 1;
  return { w1: w1/sum, w2: w2/sum, w3: w3/sum };
}

function influenceScore(s, w){
  return w.w1 * s.metrics.h_index +
         w.w2 * Math.log(Math.max(s.metrics.total_citations,1)) * 10 +
         w.w3 * Math.sqrt(Math.max(s.metrics.recent_3y_citations,0)) * 1.5;
}

function normalizedInfluenceScore(s, w){
  const raw = influenceScore(s, w);
  const all = DATA.scholars.map(x => influenceScore(x, w));
  const min = Math.min(...all);
  const max = Math.max(...all);
  return max === min ? 0.5 : (raw - min) / (max - min);
}

function ragScoreFor(s){
  const hit = ragByScholar.get(s.id);
  if(!hit) return 0;
  if(typeof hit.rag_score === "number") return hit.rag_score;
  return Math.max(0, 1 - ((hit.rag_rank || 50) - 1) / 50);
}

function normalizeRagScores(){
  const hits = Array.from(ragByScholar.values()).filter(h => typeof h.rag_score === "number");
  if(!hits.length) return;
  const min = Math.min(...hits.map(h => h.rag_score));
  const max = Math.max(...hits.map(h => h.rag_score));
  ragByScholar.forEach(hit => {
    if(typeof hit.rag_score !== "number"){
      hit.rag_score = Math.max(0, 1 - ((hit.rag_rank || 50) - 1) / 50);
    }else{
      hit.rag_score = max === min ? 1 : (hit.rag_score - min) / (max - min);
    }
  });
}

async function loadRagResults(){
  if(!searchQuery) return;
  console.log("[scholartrace] live search for:", searchQuery);
  // 纯前端模式：直接走 OpenAlex 实时搜索，不依赖本地 server.py
  await loadFromOpenAlexFallback();
}

const PERSON_NAME_MAP = {
  // 中文 → 英文别名（OpenAlex 搜索用）
  "李飞飞": "Fei-Fei Li",
  "辛顿": "Geoffrey Hinton",
  "杨立昆": "Yann LeCun",
  "本吉奥": "Yoshua Bengio",
  "黄仁勋": "Jensen Huang",
  "刘铁岩": "Tie-Yan Liu",
  "秦涛": "Tao Qin",
  "李航": "Hang Li",
  "孙茂松": "Maosong Sun",
  "唐杰": "Jie Tang",
  "周志华": "Zhi-Hua Zhou",
  "朱军": "Jun Zhu"
};

function looksLikePersonName(q){
  // 中文 2-4 字 / 包含明显的人名英文（如 "Liu", "Li", "Chen" 等）/ 在 map 里
  if(PERSON_NAME_MAP[q]) return true;
  if(/^[一-龥]{2,4}$/.test(q)) return true;  // 纯中文 2-4 字
  if(/^[A-Z][a-z]+\s+[A-Z]/.test(q)) return true;     // 英文人名格式
  return false;
}

async function loadFromOpenAlexFallback(){
  const ALIAS = PERSON_NAME_MAP[searchQuery];
  const isPerson = looksLikePersonName(searchQuery) || !!ALIAS;
  const useQuery = ALIAS || searchQuery;
  console.log("[scholartrace] OpenAlex fallback · isPerson=" + isPerson + " · query=" + useQuery);

  try{
    let oaResults = [];
    if(isPerson){
      // /authors search
      const r = await fetch(`https://api.openalex.org/authors?search=${encodeURIComponent(useQuery)}&per_page=10&sort=cited_by_count:desc&mailto=scholartrace@demo.dev`);
      if(!r.ok) throw new Error("OpenAlex authors " + r.status);
      const data = await r.json();
      oaResults = (data.results || []).slice(0, 10).map((oa, idx) => oaAuthorToScholar(oa, idx));
    } else {
      // /works + AI filter, aggregate authors
      const r = await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(useQuery)}&filter=concepts.id:C154945302&sort=cited_by_count:desc&per_page=25&select=display_name,cited_by_count,publication_year,authorships&mailto=scholartrace@demo.dev`);
      if(!r.ok) throw new Error("OpenAlex works " + r.status);
      const data = await r.json();
      const agg = {};
      const palette = ["amber","rose","emerald","sky","violet","stone","blue","fuchsia","purple","indigo","slate"];
      data.results.forEach(p => {
        (p.authorships || []).slice(0, 5).forEach(a => {
          const oid = a?.author?.id;
          if(!oid) return;  // OpenAlex 偶尔返回没 author.id 的项，跳过
          if(!agg[oid]){
            agg[oid] = {
              id: "oa-" + oid.split("/").pop().toLowerCase(),
              name: a.author.display_name || "Unknown", chinese_name: "",
              institution: (a.institutions && a.institutions[0]?.display_name) || "",
              avatar_color: palette[Object.keys(agg).length % palette.length],
              role_in_field: `OpenAlex 实时检索 · ${useQuery}`,
              relation_to_center: "live",
              metrics: { h_index: 0, total_citations: 0, recent_3y_citations: 0, field_papers: 0, centrality: 0.5, consistency: 0.5, _unverified: true },
              field_papers: [], research_line: "(OpenAlex 实时数据)", recommended_reading: [],
              llm_blurb: "OpenAlex 实时聚合", open_problems: [],
              homepage_url: "", scholar_url: oid
            };
          }
          agg[oid].metrics.field_papers++;
          agg[oid].metrics.total_citations += (p.cited_by_count || 0);
        });
      });
      oaResults = Object.values(agg).sort((a, b) => b.metrics.total_citations - a.metrics.total_citations).slice(0, 10);
      oaResults.forEach(s => {
        s.metrics.h_index = Math.max(5, Math.round(Math.sqrt(s.metrics.total_citations / 80)));
        s.metrics.recent_3y_citations = Math.round(s.metrics.total_citations * 0.18);
      });
    }

    // 把 OpenAlex 结果加进 DATA.scholars 前面，并填 ragByScholar 让排序在最前
    DATA.scholars = [...oaResults, ...DATA.scholars];
    oaResults.forEach((s, idx) => {
      ragByScholar.set(s.id, { scholar_id: s.id, rag_rank: idx + 1, rag_score: 1 - idx * 0.05, dynamic: true });
    });
    normalizeRagScores();
    ragReady = ragByScholar.size > 0;
    console.log("[scholartrace] OpenAlex fallback ✓", oaResults.length, "scholars added on top");
  } catch(err) {
    ragError = err;
    ragReady = false;
    console.error("[scholartrace] OpenAlex fallback failed", err);
  }
}

function oaAuthorToScholar(oa, idx){
  const palette = ["amber","rose","emerald","sky","violet","stone","blue","fuchsia"];
  const safeId = oa?.id ? oa.id.split("/").pop().toLowerCase() : `unknown-${idx}-${Date.now()}`;
  return {
    id: "oa-" + safeId,
    name: oa?.display_name || "Unknown Author",
    chinese_name: PERSON_NAME_MAP_REVERSE[oa.display_name] || "",
    institution: oa.last_known_institution?.display_name || (oa.affiliations && oa.affiliations[0]?.institution?.display_name) || "",
    avatar_color: palette[idx % palette.length],
    role_in_field: `OpenAlex 实时检索结果 #${idx+1}`,
    relation_to_center: "live",
    metrics: {
      h_index: oa.summary_stats?.h_index || 0,
      total_citations: oa.cited_by_count || 0,
      recent_3y_citations: Math.round((oa.cited_by_count || 0) * 0.15),
      field_papers: oa.works_count || 0,
      centrality: 0.5, consistency: 0.5,
      _unverified: false
    },
    field_papers: [],
    research_line: (oa.x_concepts || []).slice(0, 5).map(c => c.display_name).join(" · ") || "(OpenAlex 实时数据)",
    recommended_reading: [],
    llm_blurb: `OpenAlex 实时 · ${oa.works_count || 0} works · ${(oa.cited_by_count || 0).toLocaleString()} citations`,
    open_problems: [],
    homepage_url: "",
    scholar_url: oa.id
  };
}

// 反向映射：英文 → 中文（用于 OpenAlex 返回时自动补中文名）
const PERSON_NAME_MAP_REVERSE = Object.fromEntries(
  Object.entries(PERSON_NAME_MAP).map(([cn, en]) => [en, cn])
);

function mergeDynamicPayload(payload){
  if(!DATA || !payload) return;
  const scholarIds = new Set(DATA.scholars.map(s => s.id));
  (payload.scholars || []).forEach(s => {
    if(!s || !s.id || scholarIds.has(s.id)) return;
    DATA.scholars.push(s);
    scholarIds.add(s.id);
  });

  if(!Array.isArray(DATA.edges)) DATA.edges = [];
  const edgeKeys = new Set(DATA.edges.map(e => `${e.source}|${e.target}|${e.type}`));
  (payload.edges || []).forEach(e => {
    const key = `${e.source}|${e.target}|${e.type}`;
    if(!e.source || !e.target || edgeKeys.has(key)) return;
    DATA.edges.push(e);
    edgeKeys.add(key);
  });
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderList(){
  const w = getWeights();
  const ranked = DATA.scholars
    .map(s => {
      const influence = normalizedInfluenceScore(s, w);
      const rag = ragScoreFor(s);
      const score = ragReady ? rag * 75 + influence * 25 : influenceScore(s, w);
      return {...s, score, rag_hit: ragByScholar.get(s.id)};
    })
    .sort((a,b) => b.score - a.score)
    .slice(0, K);
  const list = document.getElementById("list");
  list.innerHTML = "";
  const maxH = Math.max(...DATA.scholars.map(s => s.metrics.h_index));
  const maxC = Math.max(...DATA.scholars.map(s => s.metrics.total_citations));
  const maxR = Math.max(...DATA.scholars.map(s => s.metrics.recent_3y_citations));

  ranked.forEach((s, idx) => {
    const initial = s.chinese_name?.[0] || s.name[0];
    const judged = aiJudged.has(s.id);
    const aiScore = aiScores[s.id];
    const avBg = AVATAR_COLORS[s.avatar_color] || "#9a8b7e";

    const a = document.createElement("a");
    a.href = `graph.html?id=${s.id}&field=${fieldId}`;
    a.className = `rank-card${judged ? " ai-judged" : ""}${firstRender ? " card-enter" : ""}`;
    if(firstRender) a.style.animationDelay = (idx * 0.06) + "s";

    const pctH = (s.metrics.h_index/maxH*100).toFixed(0);
    const pctC = (s.metrics.total_citations/maxC*100).toFixed(0);
    const pctR = (s.metrics.recent_3y_citations/maxR*100).toFixed(0);
    const unv = s.metrics._unverified;

    a.innerHTML = `
      <div class="rank-no">
        <span class="num">#${idx+1}</span>
        <div class="avatar" style="background:linear-gradient(135deg,${avBg},${avBg}cc)">${initial}</div>
      </div>
      <div class="body">
        <div class="name-row">
          <h4>${s.chinese_name || s.name}</h4>
          ${s.chinese_name ? `<span class="en">${s.name}</span>` : ""}
          ${unv ? `<span class="badge unverified" title="Semantic Scholar 对此学者聚类不完整，数据可能低估">⚠ SS 索引不全</span>` : ""}
          ${judged ? `<span class="badge ai">✨ AI ${aiScore.toFixed(1)}/10</span>` : ""}
        </div>
        <p class="inst">${s.institution}</p>
        <p class="role">${s.role_in_field}</p>
        ${s.rag_hit?.snippet ? `<p class="rag-hit">RAG 命中：${escapeHtml(s.rag_hit.snippet).slice(0, 170)}...</p>` : ""}
        <div class="metrics">
          <div class="m"><div class="row"><span class="k">h-index</span><span class="v"><span class="cu-h" data-target="${s.metrics.h_index}">${firstRender ? 0 : s.metrics.h_index}</span></span></div><div class="bar"><div style="width:${pctH}%"></div></div></div>
          <div class="m"><div class="row"><span class="k">total cit</span><span class="v"><span class="cu-c" data-target="${s.metrics.total_citations}">${firstRender ? '0' : (s.metrics.total_citations/1000).toFixed(0)+'k'}</span></span></div><div class="bar"><div style="width:${pctC}%"></div></div></div>
          <div class="m"><div class="row"><span class="k">recent 3y</span><span class="v"><span class="cu-r" data-target="${s.metrics.recent_3y_citations}">${firstRender ? '0' : (s.metrics.recent_3y_citations/1000).toFixed(1)+'k'}</span></span></div><div class="bar"><div style="width:${pctR}%"></div></div></div>
        </div>
      </div>
      <div class="field-cnt">
        <p class="lbl">field papers</p>
        <p class="v">${s.metrics.field_papers}</p>
        <p class="score">score ${s.score.toFixed(1)}</p>
      </div>
    `;
    list.appendChild(a);
  });

  const modeText = ragReady ? `RAG 语义排序 → Top ${K}` : `本地指标排序 → Top ${K}`;
  const suffix = ragError ? " · realtime fallback" : "";
  document.getElementById("meta-info").textContent = `${modeText} (${aiJudged.size}/${Math.min(K,DATA.scholars.length)} AI 评审)${suffix}`;

  if(firstRender){
    requestAnimationFrame(() => {
      document.querySelectorAll(".cu-h").forEach(el => countUp(el, +el.dataset.target, 700, v => Math.round(v)));
      document.querySelectorAll(".cu-c").forEach(el => countUp(el, +el.dataset.target, 900, v => (v/1000).toFixed(0)+"k"));
      document.querySelectorAll(".cu-r").forEach(el => countUp(el, +el.dataset.target, 900, v => (v/1000).toFixed(1)+"k"));
    });
    firstRender = false;
  }
}

["w1","w2","w3"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    const w = getWeights();
    document.getElementById("w1-val").textContent = Math.round(w.w1*100)+"%";
    document.getElementById("w2-val").textContent = Math.round(w.w2*100)+"%";
    document.getElementById("w3-val").textContent = Math.round(w.w3*100)+"%";
    if(DATA) renderList();
  });
});

document.getElementById("reset").addEventListener("click", () => {
  document.getElementById("w1").value = 40;
  document.getElementById("w2").value = 30;
  document.getElementById("w3").value = 30;
  document.getElementById("w1").dispatchEvent(new Event("input"));
});

document.querySelectorAll(".k-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".k-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    K = parseInt(b.dataset.k);
    if(DATA) renderList();
  });
});

async function startAIStream(){
  const sorted = DATA.scholars
    .map(s => {
      const w = getWeights();
      const influence = normalizedInfluenceScore(s, w);
      const rag = ragScoreFor(s);
      const score = ragReady ? rag * 75 + influence * 25 : influenceScore(s, w);
      return {...s, score};
    })
    .sort((a,b) => b.score - a.score);
  for(let i = 0; i < Math.min(K, sorted.length); i++){
    await new Promise(r => setTimeout(r, 400 + Math.random()*200));
    const s = sorted[i];
    aiJudged.add(s.id);
    aiScores[s.id] = Math.min(10, Math.max(6, 7.5 + (s.metrics.centrality - 0.5)*4 + (Math.random()-0.5)*0.8));
    renderList();
    const pct = 55 + (i+1)/Math.min(K, sorted.length)*45;
    document.getElementById("progress").style.width = pct + "%";
  }
  document.getElementById("status-text").textContent = "AI 重排完成";
  document.getElementById("status-dot").classList.add("done");
}
</script>
