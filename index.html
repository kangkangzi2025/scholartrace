<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScholarTrace · 学脉</title>
<style>
  :root{
    --blue:#d97757;
    --blue-hover:#c2410c;
    --ink:#2b2118;
    --gray:#6b5d52;
    --gray-soft:#9a8b7e;
    --border:#ece2d8;
    --bg:#faf6f2;
    --link:#b8551e;
    --c-self:#e8804a;
    --c-advisor:#f0a060;
    --c-collab:#f5bd87;
    --c-paper:#f8d9b8;
    --shadow-sm:0 1px 2px rgba(120,72,40,.07),0 1px 3px rgba(120,72,40,.10);
    --shadow-md:0 4px 12px rgba(120,72,40,.09),0 2px 4px rgba(120,72,40,.06);
    --shadow-lg:0 12px 32px rgba(120,72,40,.14),0 4px 8px rgba(120,72,40,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
    color:var(--ink);background:var(--bg);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;flex-direction:column;min-height:100%;position:relative;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(680px 480px at 18% -8%, rgba(217,119,87,.16), transparent 60%),
      radial-gradient(560px 420px at 92% 6%, rgba(240,168,104,.12), transparent 60%),
      radial-gradient(700px 500px at 50% 120%, rgba(194,65,12,.07), transparent 60%),
      var(--bg);
  }
  ::selection{background:rgba(217,119,87,.25);color:var(--ink);}
  .hero{display:flex;flex-direction:column;align-items:center;padding-top:min(14vh,140px);padding-bottom:54px;animation:rise .7s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .logo{display:flex;align-items:center;gap:13px;margin-bottom:30px;user-select:none;}
  .logo .cap{filter:drop-shadow(0 6px 14px rgba(217,119,87,.40));}
  .logo .word{display:flex;align-items:center;gap:12px;font-weight:300;letter-spacing:-.5px;}
  .logo .word b{
    font-size:36px;font-weight:800;letter-spacing:-1px;
    background:linear-gradient(120deg,#c2410c 0%,#d97757 45%,#f0a868 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 10px rgba(217,119,87,.45));
  }
  .logo .word .zh{font-size:36px;font-weight:400;color:var(--gray);letter-spacing:1px;}
  .tagline{margin:-6px 0 26px;text-align:center;color:var(--gray);font-size:14.5px;letter-spacing:.2px;}
  .tagline b{color:var(--blue-hover);font-weight:550;}
  .search-wrap{width:min(660px,92vw);}
  .search-box{display:flex;align-items:center;gap:6px;padding:0 8px 0 20px;height:56px;background:rgba(255,253,251,.78);backdrop-filter:blur(12px) saturate(140%);-webkit-backdrop-filter:blur(12px) saturate(140%);border:1px solid var(--border);border-radius:30px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,border-color .2s;}
  .search-box .lead-ico{flex:0 0 auto;opacity:.5;}
  .search-box.focused{box-shadow:var(--shadow-lg);border-color:rgba(217,119,87,.50);background:rgba(255,253,251,.95);}
  .search-box input{flex:1;border:0;outline:0;background:transparent;font-size:17px;height:100%;color:var(--ink);font-family:inherit;}
  .search-box input::placeholder{color:var(--gray-soft);}
  .search-box .clear{display:none;cursor:pointer;color:var(--gray-soft);font-size:22px;line-height:1;padding:0 8px;border-radius:50%;transition:color .15s;}
  .search-box .clear:hover{color:var(--ink);}
  .search-box.has-text .clear{display:block;}
  .search-btn{border:0;cursor:pointer;flex:0 0 auto;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#d97757,#c2410c);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(194,65,12,.40);transition:transform .1s,box-shadow .2s;}
  .search-btn:hover{box-shadow:0 5px 14px rgba(194,65,12,.5);}
  .search-btn:active{transform:scale(.92);}
  .search-btn svg{fill:#fff;width:21px;height:21px;}
  .hint{height:22px;margin-top:14px;font-size:13px;color:var(--gray-soft);text-align:center;opacity:0;transition:opacity .22s;}
  .hint.show{opacity:1;}
  .hint.warn{color:#d93025;}

  section.fields, section.pipeline{max-width:1020px;margin:0 auto;padding:8px 24px 40px;}
  section h3.sec-title{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gray-soft);margin-bottom:14px;}

  .pipeline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
  .stage{background:rgba(255,253,251,.6);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stage .step{font-size:10px;color:var(--blue-hover);font-weight:700;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .stage .name{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:4px;}
  .stage .desc{font-size:11.5px;color:var(--gray);line-height:1.55;}

  footer{font-size:12.5px;color:var(--gray-soft);padding:18px 28px;display:flex;gap:22px;flex-wrap:wrap;border-top:1px solid var(--border);background:rgba(247,240,233,.6);margin-top:auto;}
  footer a{color:var(--gray-soft);text-decoration:none;}
  footer a:hover{color:var(--ink);text-decoration:underline;}
  footer .spacer{flex:1;}

  /* === Overlay: Agent Terminal === */
  .overlay{position:fixed;inset:0;background:rgba(43,33,24,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:60;display:none;justify-content:center;padding:24px;overflow-y:auto;}
  .overlay.show{display:flex;padding-top:8vh;}
  .terminal-wrap{max-width:640px;width:100%;background:rgba(255,253,251,.97);border:1px solid var(--border);border-radius:18px;padding:28px 32px;box-shadow:var(--shadow-lg);align-self:flex-start;}
  .terminal-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .terminal-head .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .terminal-head span{font-size:13px;color:var(--blue-hover);font-family:'JetBrains Mono',monospace;}
  .terminal{font-family:'JetBrains Mono','Menlo',monospace;font-size:13px;line-height:1.85;color:var(--ink);white-space:pre-wrap;}
  .terminal .stage-name{color:var(--blue-hover);font-weight:600;}
  .terminal .ok{color:#0e9f6e;}
  .terminal .warn{color:#b08200;}
  .terminal .high{color:var(--blue-hover);background:rgba(217,119,87,.08);padding:0 4px;border-radius:3px;}
  .terminal .blink::after{content:"▌";color:var(--blue-hover);animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  @keyframes lineIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:none;}}
  .terminal > div{animation:lineIn .18s cubic-bezier(.16,1,.3,1) both;}

  @media(max-width:560px){.logo .word b{font-size:28px;}.logo .word .zh{font-size:28px;}}
</style>
</head>
<body>
  <section class="hero">
    <div class="logo">
      <svg class="cap" width="50" height="50" viewBox="0 0 50 50" aria-hidden="true">
        <defs><linearGradient id="capG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8804a"/><stop offset="1" stop-color="#c2410c"/></linearGradient></defs>
        <circle cx="25" cy="25" r="25" fill="url(#capG)"/>
        <path d="M25 13 L41 20.5 L25 28 L9 20.5 Z" fill="#fff"/>
        <path d="M15 23.5 L15 31 C15 33.7 19.5 35.4 25 35.4 C30.5 35.4 35 33.7 35 31 L35 23.5 L25 28 Z" fill="#fff" opacity=".9"/>
        <rect x="40" y="20.5" width="1.7" height="10" rx=".8" fill="#fff"/>
        <circle cx="40.85" cy="31.5" r="2" fill="#fff"/>
      </svg>
      <div class="word"><b>ScholarTrace</b><span class="zh">学脉</span></div>
    </div>
    <p class="tagline">输入关键词，用 <b>RAG</b> 找到最相关的学者</p>
    <div class="search-wrap">
      <div class="search-box" id="searchBox">
        <svg class="lead-ico" width="20" height="20" viewBox="0 0 24 24"><path fill="#9a8b7e" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input id="q" type="text" autocomplete="off" placeholder="输入关键词，例如 BM25 / LambdaMART / click feedback" autofocus aria-label="搜索">
        <span class="clear" id="clearBtn" title="清除">&times;</span>
        <button class="search-btn" id="go" title="检索"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg></button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </section>

  <section class="pipeline">
    <h3 class="sec-title">检索管线 · How it works</h3>
    <div class="pipeline-grid">
      <div class="stage"><div class="step">STAGE 1</div><div class="name">关键词输入</div><p class="desc">保留用户原始 query，不做领域按钮分流</p></div>
      <div class="stage"><div class="step">STAGE 2</div><div class="name">RAG 检索</div><p class="desc">Mixedbread Store 语义检索 + rerank</p></div>
      <div class="stage"><div class="step">STAGE 3</div><div class="name">学者排序</div><p class="desc">RAG 相关性优先，学术指标辅助展示</p></div>
    </div>
  </section>

  <footer>
    <a href="https://github.com/kangkangzi2025/scholartrace" target="_blank">GitHub</a>
    <a href="#">关于</a>
    <a href="#">隐私</a>
    <span class="spacer"></span>
    <span>北京中关村学院 · AI Future Hackathon 2026</span>
  </footer>

  <!-- Agent Terminal Overlay -->
  <div class="overlay" id="overlay">
    <div class="terminal-wrap">
      <div class="terminal-head"><span class="dot"></span><span>scholartrace agent · RAG pipeline running</span></div>
      <pre id="log" class="terminal"></pre>
    </div>
  </div>

<script>
const box = document.getElementById("searchBox");
const input = document.getElementById("q");
const clearBtn = document.getElementById("clearBtn");
const goBtn = document.getElementById("go");
const hint = document.getElementById("hint");

input.addEventListener("focus", () => box.classList.add("focused"));
input.addEventListener("blur", () => box.classList.remove("focused"));
input.addEventListener("input", () => box.classList.toggle("has-text", input.value.length > 0));
clearBtn.addEventListener("click", () => { input.value = ""; box.classList.remove("has-text"); input.focus(); });

let hintTimer;
function showHint(msg, warn){ hint.textContent = msg; hint.classList.toggle("warn", !!warn); hint.classList.add("show"); clearTimeout(hintTimer); hintTimer = setTimeout(() => hint.classList.remove("show"), 2800); }

function search(){
  const v = input.value.trim();
  if(!v){ showHint("请输入检索内容", true); box.classList.add("focused"); input.focus();
    box.animate([{transform:"translateX(0)"},{transform:"translateX(-5px)"},{transform:"translateX(5px)"},{transform:"translateX(0)"}],{duration:240}); return; }
  runKeywordSearch(v);
}

const PHASES = [
  { line: "&gt; ScholarTrace agent v0.1 started", delay: 100 },
  { line: "&gt; query: <span class='high' id='qlog'></span>", delay: 80 },
  { line: "", delay: 180 },
  { line: "<span class='stage-name'>[Stage 1]</span> Keyword accepted", delay: 120 },
  { line: "  <span class='ok'>✓</span> Sending query to RAG search", delay: 220 },
  { line: "", delay: 180 },
  { line: "<span class='stage-name'>[Stage 2]</span> RAG retrieval ...", delay: 100 },
  { line: "  <span class='ok'>✓</span> Mixedbread semantic search", delay: 260 },
  { line: "  <span class='ok'>✓</span> Reranking scholar profiles", delay: 260 },
  { line: "", delay: 180 },
  { line: "→ Rendering ranked scholars <span class='blink'></span>", delay: 340 },
];

async function runKeywordSearch(rawInput){
  document.getElementById("overlay").classList.add("show");
  const log = document.getElementById("log");
  log.innerHTML = "";
  for(const p of PHASES){
    const div = document.createElement("div");
    div.innerHTML = p.line;
    log.appendChild(div);
    if(div.querySelector("#qlog")) div.querySelector("#qlog").textContent = `"${rawInput}"`;
    log.scrollIntoView({ block: "end" });
    await new Promise(r => setTimeout(r, p.delay));
  }
  await new Promise(r => setTimeout(r, 500));
  const target = new URL("list.html", location.href);
  target.searchParams.set("id", "learning-to-rank");
  target.searchParams.set("q", rawInput);
  location.href = target.href;
}

goBtn.addEventListener("click", search);
input.addEventListener("keydown", e => { if(e.key === "Enter") search(); });
</script>
</body>
</html>
